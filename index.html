<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Roaster 🔥</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Resume Roaster 🔥</h1>
    <p>Paste your resume and get brutally honest feedback</p>

    <textarea id="resumeInput" placeholder="Paste your resume here..."></textarea>

    <button onclick="roastResume()">Roast Me</button>

    <div class="output-box">
      <h2>🔥 Roast:</h2>
      <p id="output">Your roast will appear here...</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
